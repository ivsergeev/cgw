<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; color: #1a1a2e; background: #fafaff; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #005BFF 0%, #7B2FFF 100%);
      padding: 24px 18px 28px;
      color: white;
      text-align: center;
    }
    .header h1 { font-size: 15px; font-weight: 700; margin-bottom: 18px; opacity: 0.95; }

    /* Big connect button */
    .connect-btn {
      width: 80px; height: 80px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 28px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      transition: all 0.25s;
      position: relative;
    }
    .connect-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); transform: scale(1.05); }
    .connect-btn.active {
      background: rgba(255,255,255,0.25);
      border-color: #4ade80;
      box-shadow: 0 0 20px rgba(74,222,128,0.3), inset 0 0 20px rgba(74,222,128,0.1);
    }
    .connect-btn.active:hover { border-color: #f87171; box-shadow: 0 0 20px rgba(248,113,113,0.3); }

    .status-label { font-size: 12px; opacity: 0.8; }
    .status-label.on { color: #4ade80; opacity: 1; }

    /* Content */
    .content { padding: 14px 18px; }
    .section-label { font-size: 10px; font-weight: 700; color: #005BFF; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 8px; }

    /* Group cards */
    .group-card {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 10px;
      background: white; border: 1px solid #eeeef5;
      margin-bottom: 6px; transition: all 0.15s;
    }
    .group-card:hover { border-color: #005BFF40; box-shadow: 0 2px 8px rgba(0,91,255,0.06); }
    .group-card.disabled { opacity: 0.45; }
    .group-card .info { flex: 1; min-width: 0; }
    .group-card .name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-card .desc { font-size: 11px; color: #8b8ba3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-card .count { font-size: 11px; color: #005BFF; background: #f0f4ff; padding: 2px 8px; border-radius: 12px; font-weight: 600; flex-shrink: 0; }

    /* Toggle switch */
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0; background: #d1d5db; border-radius: 20px;
      cursor: pointer; transition: 0.2s;
    }
    .toggle .slider::before {
      content: ''; position: absolute; width: 16px; height: 16px;
      left: 2px; top: 2px; background: white; border-radius: 50%; transition: 0.2s;
    }
    .toggle input:checked + .slider { background: #005BFF; }
    .toggle input:checked + .slider::before { transform: translateX(16px); }

    /* Empty */
    .empty { text-align: center; padding: 16px 0; color: #b0b0c0; font-size: 12px; }

    /* Footer */
    .footer { padding: 10px 18px 14px; border-top: 1px solid #eeeef5; text-align: center; }
    .footer-btn {
      padding: 8px 20px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: none; background: #f0f2f8; color: #4b5563; transition: 0.15s;
    }
    .footer-btn:hover { background: #e5e7f0; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CorpGateway</h1>
    <button class="connect-btn" id="connectBtn">⚡</button>
    <div class="status-label" id="statusLabel"></div>
  </div>

  <div class="content">
    <div class="section-label" id="groupsLabel"></div>
    <div id="groups"></div>
  </div>

  <div class="footer">
    <button class="footer-btn" id="openOptions"></button>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
