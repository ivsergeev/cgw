<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CorpGateway — Настройки</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; color: #1f2937; background: #f3f4f6; height: 100vh; overflow: hidden; }

    /* ── Layout ───────────────────────── */
    .layout { display: flex; height: 100vh; }
    .sidebar { width: 240px; background: white; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; flex-shrink: 0; }
    .center { flex: 1; display: flex; flex-direction: column; background: #f9fafb; overflow: hidden; }
    .panel { width: 420px; background: white; border-left: 1px solid #e5e7eb; overflow-y: auto; flex-shrink: 0; }

    /* ── Sidebar ──────────────────────── */
    .sidebar-header { padding: 16px; border-bottom: 1px solid #e5e7eb; }
    .sidebar-header h1 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #6b7280; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.on { background: #22c55e; } .dot.off { background: #ef4444; }
    .group-list { flex: 1; overflow-y: auto; padding: 8px; }
    .group-item { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 8px; cursor: pointer; margin-bottom: 2px; }
    .group-item:hover { background: #f3f4f6; }
    .group-item.selected { background: #eef2ff; }
    .group-item.disabled { opacity: 0.5; }
    .group-item .name { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-item .actions { display: none; gap: 2px; }
    .group-item:hover .actions { display: flex; }
    .sidebar-footer { padding: 12px; border-top: 1px solid #e5e7eb; display: flex; flex-direction: column; gap: 6px; }

    /* ── Center (skills list) ─────────── */
    .toolbar { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; display: flex; gap: 8px; align-items: center; }
    .toolbar input[type=text] { flex: 1; }
    .skill-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .skill-card { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; display: flex; align-items: flex-start; gap: 8px; }
    .skill-card:hover { background: #f3f4f6; }
    .skill-card.selected { background: #eef2ff; }
    .skill-card .info { flex: 1; min-width: 0; }
    .skill-card .top { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .method-badge { background: #f0f4ff; color: #005BFF; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .skill-card .skill-name { font-size: 14px; font-weight: 600; }
    .skill-card .sig { font-size: 11px; color: #9ca3af; font-family: 'Cascadia Code', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .skill-card .desc { font-size: 12px; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .skill-card .card-actions { display: none; flex-shrink: 0; gap: 4px; align-items: center; }
    .skill-card:hover .card-actions { display: flex; }

    /* ── Panel (right) ────────────────── */
    .panel-content { padding: 24px; }
    .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #9ca3af; font-size: 15px; text-align: center; }
    .panel-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .section-title { font-size: 13px; font-weight: 600; color: #374151; margin: 16px 0 10px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
    .section-title:first-of-type { border-top: none; padding-top: 0; }

    /* ── Form elements ────────────────── */
    label { display: block; font-size: 12px; font-weight: 500; color: #6b7280; margin-bottom: 4px; }
    input[type=text], input[type=number], textarea, select {
      width: 100%; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px; margin-bottom: 12px; font-family: inherit; background: white;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #005BFF; }
    textarea { resize: vertical; min-height: 60px; }
    .mono { font-family: 'Cascadia Code', Consolas, monospace; font-size: 12px; }
    .hint { font-size: 11px; color: #9ca3af; margin-top: -8px; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; } .row > * { flex: 1; }
    .flex { display: flex; gap: 6px; align-items: center; }
    .token-row { display: flex; gap: 6px; margin-bottom: 12px; } .token-row input { flex: 1; }
    input[type=checkbox] { width: 16px; height: 16px; margin: 0; cursor: pointer; }

    /* ── Buttons ──────────────────────── */
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 4px; }
    .btn-primary { background: #005BFF; color: white; } .btn-primary:hover { background: #0047cc; }
    .btn-danger { background: #ef4444; color: white; } .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: #4b5563; border: 1px solid #e5e7eb; } .btn-ghost:hover { background: #f3f4f6; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-icon { padding: 4px 6px; font-size: 11px; background: none; border: none; color: #9ca3af; cursor: pointer; border-radius: 6px; }
    .btn-icon:hover { background: #fee2e2; color: #ef4444; }

    /* ── Param/Header rows ────────────── */
    .param-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .param-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .param-row:last-child { margin-bottom: 0; }
    .param-row input, .param-row select { margin-bottom: 0; }
    .header-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .header-row input { margin-bottom: 0; }

    /* ── Signature preview ────────────── */
    .sig-preview { background: #f0f4ff; border: 1px solid #d0dcff; border-radius: 10px; padding: 14px; margin: 12px 0 20px; }
    .sig-preview .label { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
    .sig-preview code { font-family: 'Cascadia Code', monospace; font-size: 12px; color: #1f2937; }

    /* ── Test panel ───────────────────── */
    .test-response { background: #1e1e2e; border-radius: 10px; padding: 14px; margin-top: 8px; }
    .test-response pre { font-family: 'Cascadia Code', monospace; font-size: 12px; color: #cdd6f4; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }

    /* ── Confirmation dialog ──────────── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .overlay.hidden { display: none; }
    .dialog { background: white; border-radius: 12px; padding: 28px; min-width: 320px; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); text-align: center; }
    .dialog p { font-size: 15px; margin-bottom: 16px; }
    .dialog .actions { display: flex; gap: 10px; justify-content: center; }

    /* ── Message toast ────────────────── */
    .toast { position: fixed; top: 16px; right: 16px; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .toast.error { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="layout">

  <!-- ═══ SIDEBAR ═══ -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>CorpGateway</h1>
      <div class="status">
        <div id="bridgeDot" class="dot off"></div>
        <span id="bridgeStatus">MCP: connecting...</span>
      </div>
    </div>
    <div class="group-list" id="groupList"></div>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" style="width:100%;justify-content:center" id="addGroupBtn">+ Новая группа</button>
      <div style="border-top:1px solid #e5e7eb;margin-top:4px;padding-top:8px">
        <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:flex-start" id="openSettingsBtn">⚙ Настройки</button>
      </div>
    </div>
  </div>

  <!-- ═══ CENTER ═══ -->
  <div class="center">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Поиск скилов...">
      <button class="btn btn-ghost btn-sm" id="exportBtn">Экспорт</button>
      <button class="btn btn-ghost btn-sm" id="importBtn">Импорт</button>
      <button class="btn btn-primary btn-sm" id="addSkillBtn">+ Скил</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
    <div class="skill-list" id="skillList"></div>
  </div>

  <!-- ═══ PANEL ═══ -->
  <div class="panel" id="panel">
    <div class="empty-state" id="emptyState">
      <div>
        <div style="font-size:16px;font-weight:600;margin-bottom:4px">Выберите скил</div>
        <div style="font-size:13px;color:#d1d5db">или создайте новый</div>
      </div>
    </div>
    <div class="panel-content hidden" id="panelContent"></div>
  </div>

</div>

<!-- Confirmation dialog -->
<div class="overlay hidden" id="confirmOverlay">
  <div class="dialog">
    <p id="confirmMessage"></p>
    <div class="actions">
      <button class="btn btn-danger" id="confirmYes">Удалить</button>
      <button class="btn btn-ghost" id="confirmNo">Отмена</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="options.js" type="module"></script>
</body>
</html>
